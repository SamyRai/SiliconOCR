[mypy]
python_version = 3.13
ignore_missing_imports = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False

# Keep checks reasonable for third-party ML libraries that lack stubs
[mypy-torch.*]
ignore_missing_imports = True
[mypy-transformers.*]
ignore_missing_imports = True
[mypy-easyocr.*]
ignore_missing_imports = True
[mypy-doctr.*]
ignore_missing_imports = True
